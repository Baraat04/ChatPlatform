

services:
    db:
      image: postgres:latest
      container_name: ai_consultant_db
      restart: always
      environment:
           POSTGRES_USER: postgres
           POSTGRES_PASSWORD: postgres
           POSTGRES_DB: ai-consultant
           POSTGRES_HOST_AUTH_METHOD: trust
      ports:
      - "5435:5432"
      volumes:
      - "postgres_data:/var/lib/postgresql"
      networks:
      - intranet


networks:
  intranet:
    driver: bridge

volumes:
  postgres_data:
    