services:
  # 1. Database Service (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: chatplatform_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai-consultant
    ports:
      - "5435:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat_network

  # 2. Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatplatform_backend
    restart: always
    depends_on:
      - db
    ports:
      - "3001:3001" # Порт жестко прописан
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SESSION_SECRET=prince
      - BASE_URL=http://72.62.117.32:3001
      # Ссылка на базу данных внутри сети Docker с захардкоженными логином/паролем
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ai-consultant?schema=public
    volumes:
      - /docker/chatplatform/backend/sessions:/app/sessions
      - /docker/chatplatform/backend/uploads:/app/uploads
      - /docker/chatplatform/backend/google-key.json:/app/google-key.json
    networks:
      - chat_network

  # 3. Frontend Next.js Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # IP вашего сервера жестко вшит для сборки Next.js
        - NEXT_PUBLIC_API_URL=http://72.62.117.32:3001
    container_name: chatplatform_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - chat_network

networks:
  chat_network:
    driver: bridge

volumes:
  postgres_data:
