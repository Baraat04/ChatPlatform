services:
  db:
    image: postgres:16-alpine
    container_name: chatplatform_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai-consultant
    volumes:
      - /docker/data/chatplatform/postgres:/var/lib/postgresql/data   # ← Изменено здесь
    networks:
      - chat_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatplatform_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      SESSION_SECRET: prince
      BASE_URL: https://api.up-chat.com
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai-consultant?schema=public
    volumes:
      - /docker/chatplatform/backend/sessions:/app/sessions
      - /docker/chatplatform/backend/uploads:/app/uploads
      - /docker/chatplatform/backend/google-key.json:/app/google-key.json
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.api.rule=Host(api.up-chat.com)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=3001
    networks:
      - chat_network
      - traefik-proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.up-chat.com
    container_name: chatplatform_frontend
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.up-chat.com
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.frontend.rule=Host(up-chat.com) || Host(www.up-chat.com)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=3000
    networks:
      - chat_network
      - traefik-proxy

networks:
  chat_network:
    driver: bridge
  traefik-proxy:
    external: true
