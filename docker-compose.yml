version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: chatplatform_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5435:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatplatform_backend
    restart: always
    depends_on:
      - db
    ports:
      - "${PORT}:${PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
      - SESSION_SECRET=${SESSION_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AI_API_URL=${AI_API_URL}
      - BASE_URL=${BASE_URL}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
    volumes:
      - ./backend/sessions:/app/sessions
      - ./backend/uploads:/app/uploads
      - ./backend/google-key.json:/app/google-key.json
    networks:
      - chat_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: chatplatform_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - chat_network

networks:
  chat_network:
    driver: bridge

volumes:
  postgres_data:
